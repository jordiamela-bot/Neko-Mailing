<body class="public-home">

                            <option value="en">EN</option>
                            <option value="pt">PT</option>

                        data-t="contact_phone"></a>
                    <a href="mailto:info@nekomailing.com"
                        style="display: flex; align-items: center; gap: 0.5rem; color: var(--accent); text-decoration: none; font-weight: 600;">
                        <i class="fas fa-envelope"></i>
                        <span data-t="contact_email"></span>
                    </a>
                </div>

                <div style="text-align: right;">
                    <div style="display: flex; gap: 1rem; justify-content: flex-end; margin-bottom: 2rem;">
                        <a href="#" class="btn btn-secondary" style="border-color: rgba(255,255,255,0.2); color: white;"
                            data-t="nav_login"></a>
                    </div>

                </div>
            </div>
        </div>
    </footer>

    <!-- Cookies Banner -->
    <div id="cookie-banner" class="cookie-banner" style="display: none;">
        <div class="container cookie-content">
            <div id="cookie-main-view">
                <div class="cookie-text">
                    <p><span data-t="cookie_text"></span> <span data-t="cookie_more_info"></span> <a href="privacy.html"
                            data-t="privacy_policy" class="cookie-link"></a>.</p>
                </div>
                <div class="cookie-actions">
                    <button id="accept-cookies" class="btn btn-primary btn-sm" data-t="accept"></button>
                    <button id="configure-cookies" class="btn btn-outline btn-sm" data-t="configure"></button>
                    <button id="cancel-cookies" class="btn btn-outline btn-sm" data-t="cancel"
                        style="opacity: 0.7;"></button>
                </div>
            </div>

            <div id="cookie-config-view" style="display: none; width: 100%;">
                <div class="cookie-config-grid">
                    <div class="cookie-config-item">
                        <div class="config-header">
                            <input type="checkbox" id="cookie-necessary" checked disabled>
                            <label for="cookie-necessary" data-t="cookie_cat_necessary"></label>
                        </div>
                        <p data-t="cookie_cat_necessary_desc"
                            style="font-size: 0.8rem; margin: 0.5rem 0 0 1.8rem; opacity: 0.7;"></p>
                    </div>
                    <div class="cookie-config-item">
                        <div class="config-header">
                            <input type="checkbox" id="cookie-stats">
                            <label for="cookie-stats" data-t="cookie_cat_stats"></label>
                        </div>
                        <p data-t="cookie_cat_stats_desc"
                            style="font-size: 0.8rem; margin: 0.5rem 0 0 1.8rem; opacity: 0.7;"></p>
                    </div>
                    <div class="cookie-config-item">
                        <div class="config-header">
                            <input type="checkbox" id="cookie-marketing">
                            <label for="cookie-marketing" data-t="cookie_cat_marketing"></label>
                        </div>
                        <p data-t="cookie_cat_marketing_desc"
                            style="font-size: 0.8rem; margin: 0.5rem 0 0 1.8rem; opacity: 0.7;"></p>
                    </div>
                </div>
                <div class="cookie-actions" style="margin-top: 1.5rem; justify-content: flex-end;">
                    <button id="save-cookies" class="btn btn-primary btn-sm" data-t="save_prefs"></button>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>

</html>
